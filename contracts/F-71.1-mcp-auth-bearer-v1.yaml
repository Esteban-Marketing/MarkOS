id: F-71.1-mcp-auth-bearer-v1
phase: 200.1
name: MCP Bearer Auth And Keys
status: active
summary: MCP HTTP surface hardened with tenant-scoped bearer keys, rate limiting, kill-switch checks, and inline cost/audit telemetry.

transport:
  http_session_endpoint: /api/mcp/session
  dispatch_endpoint: /api/mcp/tools/{toolName}
  protocol: json-rpc-2.0
  protocol_version: "2025-06-18"

security:
  precedence:
    - mcpBearerAuth
    - hostedSupabaseAuth

paths:
  /api/mcp/session:
    get:
      summary: Return MCP metadata and discovery surfaces
      responses:
        '200':
          description: MCP server metadata
    post:
      summary: JSON-RPC 2.0 MCP request
      security:
        - mcpBearerAuth: []
      responses:
        '200':
          description: JSON-RPC response envelope
        '401':
          description: Missing or invalid bearer token
        '402':
          description: Tenant billing hold kill-switch triggered
        '429':
          description: Per-tenant MCP bearer rate limit exceeded

  /api/mcp/tools/{toolName}:
    post:
      summary: Invoke one MCP tool by name
      security:
        - mcpBearerAuth: []
      parameters:
        - name: toolName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Tool result
        '400':
          description: Invalid tool input
        '401':
          description: Missing or invalid bearer token
        '402':
          description: Tenant billing hold kill-switch triggered
        '404':
          description: Tool not found
        '429':
          description: Per-tenant MCP bearer rate limit exceeded

  /api/mcp/keys/create:
    post:
      summary: Mint a new tenant MCP key
      security:
        - hostedSupabaseAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: MCP key created; plaintext_token_show_once is returned once
        '401':
          description: Hosted Supabase auth required

  /api/mcp/keys/list:
    get:
      summary: List active tenant MCP keys
      security:
        - hostedSupabaseAuth: []
      responses:
        '200':
          description: Active keys without plaintext or stored hash
        '401':
          description: Hosted Supabase auth required

  /api/mcp/keys/revoke:
    post:
      summary: Revoke a tenant MCP key
      security:
        - hostedSupabaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        '200':
          description: Key revoked
        '401':
          description: Hosted Supabase auth required
        '404':
          description: Key not found

components:
  securitySchemes:
    mcpBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: mks_<32-bytes-base32>
    hostedSupabaseAuth:
      type: http
      scheme: bearer
      bearerFormat: Supabase JWT

  schemas:
    McpKeyCreateResponse:
      type: object
      required: [id, label, scopes, created_at, plaintext_token_show_once]
      properties:
        id:
          type: string
        label:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        key_fingerprint:
          type: string
        plaintext_token_show_once:
          type: string

    McpKeyListItem:
      type: object
      required: [id, tenant_id, label, scopes, created_at, key_fingerprint]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        label:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        key_fingerprint:
          type: string

    McpKeyRevokeResponse:
      type: object
      required: [ok, revoked_at]
      properties:
        ok:
          type: boolean
        revoked_at:
          type: string
          format: date-time

    McpBearerError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        detail:
          type: object
          additionalProperties: true
