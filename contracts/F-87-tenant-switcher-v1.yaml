id: F-87-tenant-switcher-v1
phase: 201
name: Tenant Switcher + Create-in-Org
status: active
summary: |
  Org + tenant switcher endpoints powering Surface 5 (workspace shell switcher pill).
  Allows a user to list every org+tenant they belong to and create an additional tenant inside
  an existing org they own (or billing-admin on).

boundary:
  tenant_scoped: false
  requires_session: true

decisions:
  - D-13 one-user-many-tenants via shared org with single invoice
  - Reserved-slug + unique-slug enforcement shared with Plan 01 isReservedSlug

paths:
  /api/tenant/switcher/list:
    get:
      summary: List every org + tenant the current user belongs to
      operationId: listSwitcherTargets
      tags: [tenancy, switcher]
      responses:
        '200':
          description: Orgs grouped with their tenants
          content:
            application/json:
              schema:
                type: object
                required: [orgs]
                properties:
                  orgs:
                    type: array
                    items: { $ref: '#/components/schemas/OrgGroup' }
        '401': { description: unauthenticated }

  /api/tenant/switcher/create-tenant:
    post:
      summary: Create a new tenant inside an existing org
      operationId: createSwitcherTenant
      tags: [tenancy, switcher]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name]
              properties:
                slug: { type: string, pattern: '^[a-z0-9-]{2,63}$' }
                name: { type: string, minLength: 2, maxLength: 80 }
      responses:
        '201':
          description: Tenant created; caller added as owner
          content:
            application/json:
              schema:
                type: object
                required: [tenant_id, slug]
                properties:
                  tenant_id: { type: string }
                  slug: { type: string }
        '400': { description: slug_reserved | slug_taken | slug_and_name_required }
        '401': { description: unauthenticated }
        '403': { description: forbidden (non-owner/billing-admin of org) }

components:
  schemas:
    OrgGroup:
      type: object
      required: [org_id, org_name, org_slug, org_role, tenants]
      properties:
        org_id: { type: string }
        org_name: { type: string }
        org_slug: { type: string }
        org_role: { type: string, enum: [owner, billing-admin, readonly] }
        tenants:
          type: array
          items: { $ref: '#/components/schemas/TenantEntry' }
    TenantEntry:
      type: object
      required: [id, slug, name, iam_role, status]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        iam_role: { type: string }
        status: { type: string, enum: [active, offboarding, purged] }

security_considerations:
  - createTenantInOrg requires org_role=owner|billing-admin; RLS on markos_tenants enforces it too.
  - Reserved-slug list shared with Plan 01 — avoids namespace conflicts with /api, /admin, /docs.
  - Tenant list never exposes purged tenants (status filter inside listTenantsForUser).
  - Every create emits source_domain='tenancy' action='tenant.created' audit row.
