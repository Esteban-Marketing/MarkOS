id: F-73-webhook-delivery-v1
phase: 200
name: Webhook Delivery
status: active
summary: Webhook delivery engine with signed HTTP POST + retry backoff.

boundary:
  tenant_scoped: true
  manager_scope_cross_tenant: false

delivery:
  method: POST
  content_type: application/json
  signed_input: "{timestamp}.{body}"
  signature_header: X-Markos-Signature
  timestamp_header: X-Markos-Timestamp

# Phase 203 Plan 04 Task 2 — outbound headers extended for replay + dual-sign rotation.
# signPayloadDualSign (Plan 203-05 dispatch path) emits X-Markos-Signature-V1 always and
# X-Markos-Signature-V2 conditionally (during rotation grace). Replay dispatch additionally
# emits X-Markos-Replayed-From (original delivery timestamp) and X-Markos-Attempt (per-attempt
# counter, starts at 1 on the wire). D-06 forbids preserving the ORIGINAL signature/timestamp.
outbound_headers:
  X-Markos-Signature: legacy single-version signature (200-03 callers before rotation ships)
  X-Markos-Signature-V1: current rotation V1 signature (Plan 203-05)
  X-Markos-Signature-V2: rotation grace V2 signature (Plan 203-05; absent when no rotation active)
  X-Markos-Timestamp: unix seconds; shared across V1/V2; freshly signed per attempt
  x-markos-replayed-from: original delivery created_at ISO string when the current attempt is a replay (D-06)
  x-markos-attempt: 1-based attempt counter (delivery.cjs increments per dispatch)

retry:
  max_attempts: 24
  backoff: exponential
  base_delay_seconds: 5
  max_delay_seconds: 86400
  statuses:
    pending: initial, awaiting first dispatch
    retrying: failed but eligible for next attempt
    delivered: 2xx response captured
    failed: 24 attempts exhausted or unrecoverable

paths:
  /api/webhooks/test-fire:
    post:
      summary: Enqueue a synthetic delivery against an existing subscription
      operationId: testFireWebhook
      tags:
        - webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription_id]
              properties:
                subscription_id: { type: string }
                event: { type: string, default: approval.created }
                payload: { type: object, additionalProperties: true }
                skip_dispatch:
                  type: boolean
                  description: When true, enqueue only (useful for smoke tests).
                  default: false
      responses:
        '200':
          description: Delivery dispatched (sync path)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  delivery_id: { type: string, pattern: "^whdel_" }
                  result:
                    type: object
                    properties:
                      delivered: { type: boolean }
                      status: { type: integer }
                      attempt: { type: integer }
        '202':
          description: Delivery enqueued, not dispatched (skip_dispatch=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  delivery: { $ref: '#/components/schemas/WebhookDelivery' }
        '404': { description: Subscription not found }

components:
  schemas:
    WebhookDelivery:
      type: object
      required: [id, subscription_id, tenant_id, event, payload, attempt, status, created_at, updated_at]
      properties:
        id: { type: string, pattern: "^whdel_" }
        subscription_id: { type: string }
        tenant_id: { type: string }
        event: { type: string }
        payload: { type: object, additionalProperties: true }
        attempt: { type: integer, minimum: 0, maximum: 24 }
        status:
          type: string
          enum: [pending, retrying, delivered, failed]
        response_code: { type: integer, nullable: true }
        last_error: { type: string, nullable: true }
        next_retry_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        # Phase 203 Plan 02/04 additions (migration 72 columns).
        replayed_from:
          type: string
          nullable: true
          description: Original delivery_id if this row is a replay (null otherwise). Self-ref FK with on delete set null.
        dlq_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp set when delivery transitions to status=failed after the 24-attempt cap (D-07 terminal DLQ marker).
        final_attempt:
          type: integer
          nullable: true
          description: Final attempt counter at the moment the delivery was marked failed.
        dlq_reason:
          type: string
          nullable: true
          description: Categorized failure reason (e.g. ssrf_blocked, 5xx_exhausted, timeout_exhausted).

storage:
  table: markos_webhook_deliveries
  rls: markos_tenant_memberships
  migration: supabase/migrations/70_markos_webhook_subscriptions.sql
