id: F-103-cli-runs-v1
flow_id: F-103
phase: 204
name: CLI Runs — Plan + Create + Events + Cancel
title: CLI Runs — dry-run plan, durable submit, SSE event stream, cancel
version: v1
status: active
domain: cli
summary: >-
  The `markos run` flow family. F-103 unifies four paths:
    - POST /api/tenant/runs/plan          (Plan 204-05; dry-run; no DB write)
    - POST /api/tenant/runs                (Plan 204-06; durable submit; 201)
    - GET  /api/tenant/runs/{run_id}/events (Plan 204-06; SSE progress stream)
    - POST /api/tenant/runs/{run_id}/cancel (Plan 204-06; idempotent cancel)
  All paths share the `BriefInput` and `PlanEnvelope` schemas so the dry-run
  and durable-submit responses remain shape-compatible. The durable response
  adds `run_id` (non-null), `events_url`, and `correlation_id` on top of the
  dry-run envelope. run rows are AgentRun v2 forward-compatible per Phase 207
  Plan 01 CONTRACT-LOCK (priority, chain_id, trigger_kind, source_surface,
  estimated_cost_usd_micro BIGINT).

boundary:
  tenant_scoped: true
  manager_scope_cross_tenant: false

references:
  - D-02
  - D-06
  - D-10
  - D-207-03
  - A1
  - A8
  - CLI-01
  - QA-01
  - QA-02
  - QA-04
  - QA-09
  - QA-11

auth_modes:
  bearer:
    header: "Authorization: Bearer mks_ak_<64 hex>"
    resolution: "sha256(bearer) → markos_cli_api_keys.key_hash → lib/markos/cli/whoami.cjs::resolveWhoami"
    tenant_context: "derived from the minted key (tenant_id field)"
  legacy_session:
    headers:
      - "x-markos-user-id"
      - "x-markos-tenant-id"
    resolution: "lib/markos/cli/whoami.cjs::resolveSessionWhoami"
    tenant_context: "asserted by the caller via header; enforced by RLS at query layer"

paths:
  /api/tenant/runs/plan:
    post:
      summary: Dry-run planner — validates brief + returns plan DAG with token/cost estimates. No DB write.
      operationId: cliRunsPlan
      tags:
        - cli
        - runs
        - plan
      parameters:
        - { name: Authorization, in: header, required: false, schema: { type: string, pattern: "^Bearer mks_ak_[a-f0-9]{64}$" } }
        - { name: x-markos-user-id, in: header, required: false, schema: { type: string } }
        - { name: x-markos-tenant-id, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brief]
              properties:
                brief:
                  $ref: '#/components/schemas/BriefInput'
      responses:
        '200':
          description: Plan envelope (dry-run). No DB row created; run_id is always null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanEnvelope'
        '400':
          description: invalid_brief — missing required fields or malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidBriefError'
        '401':
          description: "No credentials OR invalid_token OR revoked_token."
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: '#/components/schemas/UnauthorizedError' }
                  - { $ref: '#/components/schemas/InvalidTokenError' }
                  - { $ref: '#/components/schemas/RevokedTokenError' }
        '405': { description: "method_not_allowed — plan is POST-only" }
        '500': { description: "plan_failed — unexpected server error" }

  /api/tenant/runs:
    post:
      summary: Create durable run — validates brief + persists markos_cli_runs row + schedules executor.
      operationId: cliRunsCreate
      tags:
        - cli
        - runs
        - create
      parameters:
        - { name: Authorization, in: header, required: false, schema: { type: string, pattern: "^Bearer mks_ak_[a-f0-9]{64}$" } }
        - { name: x-markos-user-id, in: header, required: false, schema: { type: string } }
        - { name: x-markos-tenant-id, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brief]
              properties:
                brief:
                  $ref: '#/components/schemas/BriefInput'
                priority:
                  type: string
                  enum: [P0, P1, P2, P3, P4]
                  description: "AgentRun v2 priority; default P2. Matches Phase 207 CONTRACT-LOCK §4 priority enum."
                chain_id:
                  type: [string, 'null']
                  description: "Optional AgentRun v2 chain anchor for related runs."
                idempotency_key:
                  type: [string, 'null']
                  description: "AgentRun v2 idempotency_key (Phase 204-13). Optional; when unsupplied the server derives idem_<sha256(tenant+brief)[:32]>."
                parent_run_id:
                  type: [string, 'null']
                  description: "AgentRun v2 parent_run_id self-reference. Used by chain fan-out; caller supplies when extending an existing run. (Phase 204-13)"
      responses:
        '201':
          description: "Durable run created. Use events_url to subscribe to live progress."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCreateResult'
        '400':
          description: invalid_brief — missing required fields or malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidBriefError'
        '401':
          description: "No credentials OR invalid_token OR revoked_token."
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: '#/components/schemas/UnauthorizedError' }
                  - { $ref: '#/components/schemas/InvalidTokenError' }
                  - { $ref: '#/components/schemas/RevokedTokenError' }
        '405': { description: "method_not_allowed — create is POST-only" }
        '500': { description: "run_create_failed — insert failed" }

  /api/tenant/runs/{run_id}/events:
    get:
      summary: SSE stream of run progress events. Heartbeat every 15s; terminal close on success/failed/cancelled.
      operationId: cliRunsEvents
      tags:
        - cli
        - runs
        - events
        - sse
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string, pattern: "^run_[a-f0-9]{24}$" } }
        - { name: Authorization, in: header, required: false, schema: { type: string, pattern: "^Bearer mks_ak_[a-f0-9]{64}$" } }
        - { name: x-markos-user-id, in: header, required: false, schema: { type: string } }
        - { name: x-markos-tenant-id, in: header, required: false, schema: { type: string } }
        - { name: Last-Event-ID, in: header, required: false, schema: { type: string }, description: "Resume stream from this event id + 1." }
      responses:
        '200':
          description: "text/event-stream. Frames: run.snapshot, run.step.started, run.step.completed, heartbeat, run.completed, run.aborted, run.error."
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/RunEventStream'
        '401':
          description: "No credentials OR invalid_token OR revoked_token."
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: '#/components/schemas/UnauthorizedError' }
                  - { $ref: '#/components/schemas/InvalidTokenError' }
                  - { $ref: '#/components/schemas/RevokedTokenError' }
        '403':
          description: cross_tenant_forbidden — run exists but belongs to a different tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrossTenantForbiddenError'
        '404':
          description: run_not_found — no run with this id in the caller's tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunNotFoundError'
        '405': { description: "method_not_allowed — events is GET-only" }

  /api/tenant/runs/{run_id}/cancel:
    post:
      summary: Cancel a non-terminal run. Idempotent on terminal runs (returns current state).
      operationId: cliRunsCancel
      tags:
        - cli
        - runs
        - cancel
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string, pattern: "^run_[a-f0-9]{24}$" } }
        - { name: Authorization, in: header, required: false, schema: { type: string, pattern: "^Bearer mks_ak_[a-f0-9]{64}$" } }
        - { name: x-markos-user-id, in: header, required: false, schema: { type: string } }
        - { name: x-markos-tenant-id, in: header, required: false, schema: { type: string } }
      responses:
        '200':
          description: "Run transitioned to cancelled, or already terminal (idempotent)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCancelResult'
        '401':
          description: "No credentials OR invalid_token OR revoked_token."
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: '#/components/schemas/UnauthorizedError' }
                  - { $ref: '#/components/schemas/InvalidTokenError' }
                  - { $ref: '#/components/schemas/RevokedTokenError' }
        '404':
          description: run_not_found — no run with this id in the caller's tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunNotFoundError'
        '405': { description: "method_not_allowed — cancel is POST-only" }

components:
  schemas:
    BriefInput:
      type: object
      description: "User-supplied brief. Required fields: channel, audience, pain, promise, brand. Extra keys are preserved but not required."
      required: [channel, audience, pain, promise, brand]
      properties:
        channel:  { type: string, description: "e.g. email, linkedin, twitter" }
        audience: { type: string, description: "Target ICP or segment" }
        pain:     { type: string, description: "Concrete pain the copy should acknowledge" }
        promise:  { type: string, description: "The value promise to anchor the draft" }
        brand:    { type: string, description: "Brand name that should surface in the draft" }

    PlanStep:
      type: object
      description: "Single stage of the plan DAG. v1 has exactly 3: audit → draft → score."
      required: [name, inputs, estimated_tokens]
      properties:
        name:
          type: string
          enum: [audit, draft, score]
        inputs:
          type: array
          items: { type: string }
        estimated_tokens:
          type: integer
          minimum: 0

    PlanEnvelope:
      type: object
      description: "Dry-run plan envelope. Shape-compatible with Phase 207 AgentRun v2. run_id is always null."
      required: [run_id, plan_id, steps, estimated_tokens, estimated_cost_usd, estimated_cost_usd_micro, estimated_duration_ms, tenant_id, priority]
      properties:
        run_id:
          type: [string, 'null']
        plan_id:
          type: string
          pattern: "^plan_[a-f0-9]{16}$"
        steps:
          type: array
          items: { $ref: '#/components/schemas/PlanStep' }
          minItems: 3
          maxItems: 3
        estimated_tokens:
          type: integer
          minimum: 0
        estimated_cost_usd:
          type: number
          minimum: 0
        estimated_cost_usd_micro:
          type: integer
          minimum: 0
          description: "AgentRun v2 BIGINT-safe integer micro-USD. 1 USD = 1_000_000 micro."
        estimated_duration_ms:
          type: integer
          minimum: 0
        tenant_id:
          type: string
        priority:
          type: string
          enum: [P0, P1, P2, P3, P4]
          description: "AgentRun v2 priority (Phase 207 CONTRACT-LOCK §4). Aligned with RunCreateResult.priority in Plan 204-13."
        chain_id:
          type: [string, 'null']
        model:
          type: [string, 'null']
        agent_id:
          type: string
        brief:
          $ref: '#/components/schemas/BriefInput'

    RunCreateResult:
      type: object
      description: "Response from POST /api/tenant/runs. run_id is non-null; events_url is ready to subscribe."
      required: [run_id, status, tenant_id, priority, correlation_id, events_url]
      properties:
        run_id:
          type: string
          pattern: "^run_[a-f0-9]+$"
        status:
          type: string
          enum: [pending]
          description: "Always 'pending' immediately after create. Subsequent polling via /events reveals progression."
        tenant_id:
          type: string
        priority:
          type: string
          enum: [P0, P1, P2, P3, P4]
        correlation_id:
          type: string
          description: "Opaque client-supplied or server-generated trace anchor. Propagated to audit rows."
        events_url:
          type: string
          description: "Path (not fully qualified) of the SSE event stream for this run."

    RunStatus:
      type: string
      enum: [pending, running, success, failed, cancelled]

    RunEventStream:
      type: string
      description: |-
        Sequence of SSE frames. Each frame:
          event: <name>
          data:  <JSON payload>
          id:    <monotonic integer>
          <blank line>
        Event names:
          run.snapshot        — initial state on subscribe
          run.step.started    — stage entered (1..steps_total)
          run.step.completed  — stage exited
          heartbeat           — keepalive every ~15s (empty-ish payload)
          run.completed       — terminal state reached (success/failed/cancelled)
          run.aborted         — client-triggered disconnect / cancellation
          run.error           — stream-level error (run_not_found, cross_tenant_forbidden, …)

    RunCancelResult:
      type: object
      required: [run_id, status, was_terminal]
      properties:
        run_id:
          type: string
        status:
          $ref: '#/components/schemas/RunStatus'
        was_terminal:
          type: boolean
          description: "True when the run was already terminal — the cancel was a no-op."

    InvalidBriefError:
      type: object
      required: [error, errors]
      properties:
        error:  { type: string, enum: [invalid_brief] }
        errors:
          type: array
          items: { type: string }

    UnauthorizedError:
      type: object
      required: [error]
      properties:
        error: { type: string, enum: [unauthorized] }

    InvalidTokenError:
      type: object
      required: [error]
      properties:
        error: { type: string, enum: [invalid_token] }

    RevokedTokenError:
      type: object
      required: [error, hint]
      properties:
        error: { type: string, enum: [revoked_token] }
        hint:  { type: string }

    CrossTenantForbiddenError:
      type: object
      required: [error]
      properties:
        error: { type: string, enum: [cross_tenant_forbidden] }

    RunNotFoundError:
      type: object
      required: [error]
      properties:
        error: { type: string, enum: [run_not_found] }

threat_model:
  trust_boundaries:
    - "CLI brief → server: validated via validateBrief before any processing."
    - "/runs/{run_id}/events: tenant-scoped SELECT before streaming; cross-tenant flagged as 403 when row exists but belongs to foreign tenant (F-103 treats this as 404 to avoid existence leak)."
    - "markos_cli_runs RLS policy enforces tenant_id claim match at the DB layer as defense-in-depth."
  stride:
    T-204-06-01:
      category: EoP
      disposition: mitigate
      mitigation: "events.js SELECTs run.tenant_id + compares to resolved tenant_id; RLS also enforces at DB."
    T-204-06-02:
      category: DoS
      disposition: mitigate
      mitigation: "Upstash slidingWindow(30,1m) per tenant_id on POST /runs (Phase 201 middleware)."
    T-204-06-04:
      category: Info Disclosure
      disposition: mitigate
      mitigation: "listRuns omits brief_json + result_json columns; only getRun (single-run detail) returns them."
    T-204-06-07:
      category: Info Disclosure
      disposition: mitigate
      mitigation: "events.js sets X-Accel-Buffering: no + Content-Type: text/event-stream — reverse proxies must not buffer."
    T-204-06-08:
      category: DoS
      disposition: mitigate
      mitigation: "30-min max stream duration server-side; Last-Event-ID reconnect cheap on client."

libraries:
  plan_lib:     lib/markos/cli/plan.cjs
  runs_lib:     lib/markos/cli/runs.cjs
  whoami_lib:   lib/markos/cli/whoami.cjs
  api_keys_lib: lib/markos/cli/api-keys.cjs
  brief_parser: bin/lib/brief-parser.cjs
  http_lib:     bin/lib/cli/http.cjs
  sse_client:   bin/lib/cli/sse.cjs

cli_commands:
  - command: "markos plan <brief>"
    file:    bin/commands/plan.cjs
    description: "Dry-run. TTY: 3-row step breakdown + cost summary. Non-TTY/--json: full envelope."
  - command: "markos run <brief>"
    file:    bin/commands/run.cjs
    description: "Durable submit + SSE watch. --no-watch exits after create. SIGINT sends cancel + graceful exit."
