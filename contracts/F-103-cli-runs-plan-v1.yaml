id: F-103-cli-runs-plan-v1
flow_id: F-103
phase: 204
name: CLI Runs — Plan (Dry-Run)
title: CLI Runs — Plan (dry-run planner; no durable state)
version: v1
status: active
domain: cli
summary: >-
  Pre-execution planner for the `markos run` flow. Accepts a brief, validates
  it, and returns a serialised plan DAG (audit → draft → score) with token +
  cost estimates. **Strictly no-write** — the 200 response carries run_id:null
  and no database row is created. Plan 204-06 will ship the durable sibling
  (POST /api/tenant/runs) that persists an AgentRun row per Phase 207 Plan 01
  CONTRACT-LOCK. The envelope shape returned here is a compatible subset of
  AgentRun v2 (estimated_cost_usd_micro as BIGINT, priority default P2,
  chain_id default null) so Plan 204-06 can reuse it verbatim.

boundary:
  tenant_scoped: true
  manager_scope_cross_tenant: false

references:
  - D-02
  - D-06
  - D-10
  - D-207-03
  - A1
  - A8
  - CLI-01
  - QA-01
  - QA-02
  - QA-04
  - QA-11

auth_modes:
  bearer:
    header: "Authorization: Bearer mks_ak_<64 hex>"
    resolution: "sha256(bearer) → markos_cli_api_keys.key_hash → lib/markos/cli/whoami.cjs::resolveWhoami"
    tenant_context: "derived from the minted key (tenant_id field)"
  legacy_session:
    headers:
      - "x-markos-user-id"
      - "x-markos-tenant-id"
    resolution: "lib/markos/cli/whoami.cjs::resolveSessionWhoami"
    tenant_context: "asserted by the caller via header; enforced by RLS at query layer"

paths:
  /api/tenant/runs/plan:
    post:
      summary: Dry-run planner — validates brief + returns plan DAG with token/cost estimates. No DB write.
      operationId: cliRunsPlan
      tags:
        - cli
        - runs
        - plan
      parameters:
        - { name: Authorization, in: header, required: false, schema: { type: string, pattern: "^Bearer mks_ak_[a-f0-9]{64}$" } }
        - { name: x-markos-user-id, in: header, required: false, schema: { type: string } }
        - { name: x-markos-tenant-id, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brief]
              properties:
                brief:
                  $ref: '#/components/schemas/BriefInput'
      responses:
        '200':
          description: Plan envelope (dry-run). No DB row created; run_id is always null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanEnvelope'
        '400':
          description: invalid_brief — missing required fields or malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidBriefError'
        '401':
          description: "No credentials OR invalid_token OR revoked_token."
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: '#/components/schemas/UnauthorizedError' }
                  - { $ref: '#/components/schemas/InvalidTokenError' }
                  - { $ref: '#/components/schemas/RevokedTokenError' }
        '405': { description: "method_not_allowed — plan is POST-only" }
        '500': { description: "plan_failed — unexpected server error" }

components:
  schemas:
    BriefInput:
      type: object
      description: "User-supplied brief. Required fields: channel, audience, pain, promise, brand. Extra keys are preserved but not required."
      required: [channel, audience, pain, promise, brand]
      properties:
        channel:  { type: string, description: "e.g. email, linkedin, twitter" }
        audience: { type: string, description: "Target ICP or segment" }
        pain:     { type: string, description: "Concrete pain the copy should acknowledge" }
        promise:  { type: string, description: "The value promise to anchor the draft" }
        brand:    { type: string, description: "Brand name that should surface in the draft" }

    PlanStep:
      type: object
      description: "Single stage of the plan DAG. v1 has exactly 3: audit → draft → score."
      required: [name, inputs, estimated_tokens]
      properties:
        name:
          type: string
          enum: [audit, draft, score]
        inputs:
          type: array
          items: { type: string }
          description: "Upstream step names this stage consumes (e.g. ['brief','audit'])"
        estimated_tokens:
          type: integer
          minimum: 0
          description: "Token budget for this stage. Conservative upper bound."

    PlanEnvelope:
      type: object
      description: "Dry-run plan envelope. Shape-compatible with Phase 207 AgentRun v2 (estimated_cost_usd_micro BIGINT, priority default P2). run_id is always null in dry-run."
      required: [run_id, plan_id, steps, estimated_tokens, estimated_cost_usd, estimated_cost_usd_micro, estimated_duration_ms, tenant_id, priority]
      properties:
        run_id:
          type: [string, 'null']
          description: "Always null in dry-run. Plan 204-06's POST /api/tenant/runs returns a populated run_id."
        plan_id:
          type: string
          pattern: "^plan_[a-f0-9]{16}$"
          description: "Synthetic id scoped to this dry-run response. Not persisted."
        steps:
          type: array
          items: { $ref: '#/components/schemas/PlanStep' }
          minItems: 3
          maxItems: 3
          description: "v1 DAG: [audit, draft, score]. Order is significant — inputs reference upstream step names."
        estimated_tokens:
          type: integer
          minimum: 0
          description: "Sum of step estimated_tokens."
        estimated_cost_usd:
          type: number
          minimum: 0
          description: "Placeholder Claude-tier blended rate. Display convenience; canonical billing unit is estimated_cost_usd_micro."
        estimated_cost_usd_micro:
          type: integer
          minimum: 0
          description: "AgentRun v2 compatible — BIGINT-safe integer micro-USD. 1 USD = 1_000_000 micro."
        estimated_duration_ms:
          type: integer
          minimum: 0
          description: "Conservative upper-bound wall-clock estimate."
        tenant_id:
          type: string
          description: "Caller's tenant (derived from Bearer or legacy session headers)."
        priority:
          type: string
          enum: [P0, P1, P2, P3]
          description: "AgentRun v2 priority. Dry-run defaults P2 (standard)."
        chain_id:
          type: [string, 'null']
          description: "AgentRun v2 chain anchor. Null for standalone dry-run plans."
        model:
          type: [string, 'null']
          description: "Provider-qualified model name when known. Plan 204-06 populates; dry-run leaves null."
        agent_id:
          type: string
          description: "Registry id for the agent that would execute the plan (e.g. 'markos.plan.v1')."
        brief:
          $ref: '#/components/schemas/BriefInput'

    InvalidBriefError:
      type: object
      description: "Brief failed validateBrief — returns human-readable error list (one per missing / malformed field)."
      required: [error, errors]
      properties:
        error:  { type: string, enum: [invalid_brief] }
        errors:
          type: array
          items: { type: string }

    UnauthorizedError:
      type: object
      description: "No Bearer token AND no legacy session headers."
      required: [error]
      properties:
        error: { type: string, enum: [unauthorized] }

    InvalidTokenError:
      type: object
      description: "Bearer token did not match any row in markos_cli_api_keys."
      required: [error]
      properties:
        error: { type: string, enum: [invalid_token] }

    RevokedTokenError:
      type: object
      description: "Bearer token matched a revoked row. CLI must run `markos login` to mint a fresh key."
      required: [error, hint]
      properties:
        error: { type: string, enum: [revoked_token] }
        hint:  { type: string }

threat_model:
  trust_boundaries:
    - "CLI brief → server: validated via validateBrief before any processing."
    - "Plan endpoint → no DB write: read-only introspection; not abusable for billing manipulation."
  stride:
    T-204-05-01:
      category: Info Disclosure
      disposition: accept
      rationale: "Plan response echoes the normalised brief back to the caller for confirmation UX. Brief content is user-supplied; by convention contains no secret material."
    T-204-05-02:
      category: DoS
      disposition: mitigate
      mitigation: "Plan endpoint inherits the Phase 201 tenant-level rate limit on /api/tenant/*. Read-only so no persistent load lands on DB."
    T-204-05-03:
      category: EoP
      disposition: accept
      rationale: "Plan endpoint is member-level read. Tenant_id derives strictly from the caller's own Bearer / session — cross-tenant discovery not possible."

libraries:
  plan_lib:     lib/markos/cli/plan.cjs
  whoami_lib:   lib/markos/cli/whoami.cjs
  api_keys_lib: lib/markos/cli/api-keys.cjs
  brief_parser: bin/lib/brief-parser.cjs
  http_lib:     bin/lib/cli/http.cjs

cli_commands:
  - command: "markos plan <brief>"
    file:    bin/commands/plan.cjs
    description: "TTY: 3-row step breakdown + cost/duration summary; non-TTY/--json: full envelope. Dry-run — no state change."
