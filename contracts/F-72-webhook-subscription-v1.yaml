id: F-72-webhook-subscription-v1
phase: 200
name: Webhook Subscription
status: active
summary: Tenant-scoped outbound webhook subscriptions with HMAC-SHA256 signing.

boundary:
  tenant_scoped: true
  manager_scope_cross_tenant: false

canonical_events:
  - approval.created
  - approval.resolved
  - approval.rejected
  - campaign.launched
  - campaign.paused
  - campaign.closed
  - execution.completed
  - execution.failed
  - incident.opened
  - incident.resolved
  - consent.changed
  - consent.revoked

signing:
  algorithm: HMAC-SHA256
  header_signature: X-Markos-Signature
  header_timestamp: X-Markos-Timestamp
  signature_prefix: "sha256="
  replay_window_seconds: 300

paths:
  /api/webhooks/subscribe:
    post:
      summary: Create a webhook subscription for the calling tenant
      operationId: createWebhookSubscription
      tags:
        - webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSubscribeRequest'
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscribeResponse'
        '400': { description: Validation failed }
        '401': { description: Tenant context missing }
  /api/webhooks/unsubscribe:
    post:
      summary: Deactivate a subscription (retained for audit, active=false)
      operationId: deactivateWebhookSubscription
      tags:
        - webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string }
      responses:
        '200': { description: Subscription deactivated }
        '404': { description: Subscription not found }
  /api/webhooks/list:
    get:
      summary: List subscriptions for the calling tenant
      operationId: listWebhookSubscriptions
      tags:
        - webhooks
      responses:
        '200':
          description: Subscription list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  subscriptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookSubscription'

components:
  schemas:
    WebhookSubscribeRequest:
      type: object
      required: [url, events]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
          minItems: 1
        secret:
          type: string
          description: Optional caller-provided secret; auto-generated if omitted.
    WebhookSubscription:
      type: object
      required: [id, tenant_id, url, secret, events, active, created_at, updated_at]
      properties:
        id: { type: string, pattern: "^whsub_" }
        tenant_id: { type: string }
        url: { type: string, format: uri }
        secret: { type: string, description: "V1 signing secret. Masked to last 8 chars in UI (UI-SPEC §Surface 2 Settings); never echoed in list/detail API responses during rotation." }
        events: { type: array, items: { type: string } }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        # Phase 203 Plan 05 — rotation state columns (migration 72 Plan 203-02).
        secret_v2:
          type: string
          nullable: true
          readOnly: true
          description: "Phase 203 D-10 — dual-sign secret during 30-day grace window. Never echoed in API responses (hashed or masked to last 8 chars in UI). Null outside an active rotation."
        rotation_state:
          type: string
          nullable: true
          enum: [active, rolled_back, null]
          description: "Phase 203 D-09 — active during grace window; rolled_back after explicit D-12 rollback; null outside rotation."
        grace_started_at:
          type: string
          format: date-time
          nullable: true
          description: "Phase 203 D-10 — rotation grace window start; null outside rotation."
        grace_ends_at:
          type: string
          format: date-time
          nullable: true
          description: "Phase 203 D-10 — rotation grace window end (start + 30 days); null outside rotation. After grace closes the old secret is purged (D-12)."
        rps_override:
          type: integer
          nullable: true
          minimum: 1
          description: "Phase 203 D-13 — per-subscription RPS override. May only LOWER the plan-tier default; cannot exceed plan ceiling."
    WebhookSubscribeResponse:
      type: object
      properties:
        success: { type: boolean }
        subscription: { $ref: '#/components/schemas/WebhookSubscription' }

storage:
  table: markos_webhook_subscriptions
  rls: markos_tenant_memberships
  migration: supabase/migrations/70_markos_webhook_subscriptions.sql
