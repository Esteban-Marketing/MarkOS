components:
  schemas:
    F_63A_MutationFamily:
      type: string
      enum:
        - create_task
        - append_note
        - propose_enrichment
        - update_owner
        - update_stage
    F_63A_ApprovalPackage:
      type: object
      required:
        - package_id
        - tenant_id
        - mutation_family
        - approval_required
        - run_id
        - rationale
        - evidence
      properties:
        package_id:
          type: string
        tenant_id:
          type: string
        run_id:
          type: string
        mutation_family:
          $ref: "#/components/schemas/MutationFamily"
        approval_required:
          type: boolean
          enum: "[true]"
        status:
          type: string
          enum: "[awaiting_approval, approved, rejected]"
        rationale:
          type: object
        evidence:
          type: array
          items:
            type: object
        proposed_changes:
          type: object
        immutable_lineage:
          type: object
    F_63_CopilotGroundingBundle:
      type: object
      required:
        - grounding_id
        - tenant_id
        - source_classes
        - missing_context
      properties:
        grounding_id:
          type: string
        tenant_id:
          type: string
        record:
          type: object
          nullable: true
        conversation:
          type: object
          nullable: true
        timeline:
          type: array
          items:
            type: object
        tasks:
          type: array
          items:
            type: object
        notes:
          type: array
          items:
            type: object
        outbound_history:
          type: array
          items:
            type: object
        source_classes:
          type: array
          items:
            type: string
            enum:
              - record_state
              - timeline_activity
              - linked_tasks
              - linked_notes
              - outbound_history
              - conversation_context
        missing_context:
          type: array
          items:
            type: string
    F_71_mcp_session_v1_McpToolDescriptor:
      type: object
      required: "[name, description, inputSchema]"
      properties:
        name: "{ type: string }"
        description: "{ type: string }"
        inputSchema: "{ type: object, additionalProperties: true }"
    F_72_webhook_subscription_v1_WebhookSubscribeRequest:
      type: object
      required: "[url, events]"
      properties:
        url: "{ type: string, format: uri }"
        events:
          type: array
          items: "{ type: string }"
          minItems: 1
        secret:
          type: string
          description: Optional caller-provided secret; auto-generated if omitted.
    F_72_webhook_subscription_v1_WebhookSubscription:
      type: object
      required: "[id, tenant_id, url, secret, events, active, created_at, updated_at]"
      properties:
        id: "{ type: string, pattern: \"^whsub_\" }"
        tenant_id: "{ type: string }"
        url: "{ type: string, format: uri }"
        secret: "{ type: string }"
        events: "{ type: array, items: { type: string } }"
        active: "{ type: boolean }"
        created_at: "{ type: string, format: date-time }"
        updated_at: "{ type: string, format: date-time }"
    F_72_webhook_subscription_v1_WebhookSubscribeResponse:
      type: object
      properties:
        success: "{ type: boolean }"
        subscription: "{ $ref: '#/components/schemas/WebhookSubscription' }"
    F_73_webhook_delivery_v1_WebhookDelivery:
      type: object
      required: "[id, subscription_id, tenant_id, event, payload, attempt, status, created_at, updated_at]"
      properties:
        id: "{ type: string, pattern: \"^whdel_\" }"
        subscription_id: "{ type: string }"
        tenant_id: "{ type: string }"
        event: "{ type: string }"
        payload: "{ type: object, additionalProperties: true }"
        attempt: "{ type: integer, minimum: 0, maximum: 24 }"
        status:
          type: string
          enum: "[pending, retrying, delivered, failed]"
        response_code: "{ type: integer, nullable: true }"
        last_error: "{ type: string, nullable: true }"
        next_retry_at: "{ type: string, format: date-time, nullable: true }"
        created_at: "{ type: string, format: date-time }"
        updated_at: "{ type: string, format: date-time }"
