name: Playwright Tenancy Smoke

on:
  pull_request:
    paths:
      - 'lib/markos/tenant/**'
      - 'lib/markos/auth/**'
      - 'middleware.ts'
      - 'app/(marketing)/signup/**'
      - 'app/(markos)/settings/**'
      - 'api/auth/**'
      - 'api/tenant/**'
      - 'package.json'
      - 'playwright.config.ts'
      - 'test-playwright/**'

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Confirm test mode (in-process mocks only — no live Supabase)
        run: |
          echo "MARKOS_E2E_TEST_MODE=1 — using in-process route mocks; magic-link token read from local Supabase if available"
        env:
          MARKOS_E2E_TEST_MODE: '1'

      - name: Run tenancy smoke spec
        # Advisory: this spec exercises real API endpoints (signup → magic-link → org → invite).
        # Without SUPABASE_SERVICE_ROLE_KEY + NEXT_PUBLIC_SUPABASE_URL configured as repo
        # secrets, the spec cannot retrieve the magic-link token and the post-submit
        # status assertion times out. Per Phase 201.1 HUMAN-UAT (commit bbcc910), this
        # spec is gated as live-staging UAT, not a CI blocker. continue-on-error: true
        # keeps the smoke informational while reviewers wait for staging-secret config.
        # Re-tighten to fail-on-error once SUPABASE_* secrets land in repo settings.
        continue-on-error: true
        run: npm run test:playwright:tenancy
        env:
          MARKOS_E2E_TEST_MODE: '1'
          NEXT_PUBLIC_APEX_DOMAIN: 'localhost:3000'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
