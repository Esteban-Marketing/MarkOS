name: Release markos CLI

# Phase 204.1 Plan 05 extends this release DAG with winget and apt publishing.
# Additional secrets required:
#   - WINGET_PKGS_PAT              (PAT for microsoft/winget-pkgs PR automation)
#   - MARKOS_APT_GPG_KEY          (base64 armored apt signing private key)
#   - MARKOS_APT_GPG_PASSPHRASE   (optional gpg passphrase)
#   - MARKOS_APT_REPO_HOST        (scp target, for example deploy@apt.markos.dev)
#   - MARKOS_APT_REPO_KEY         (private SSH key for apt repo upload)
# See .planning/phases/204.1-close-5-fixes-bonus-gap-3-4-decision-needed-winget-apt-distribution/204.1-05-SUMMARY.md
# for the setup runbook.

# Phase 204 Plan 12 — Release orchestration for markos CLI GA.
# Triggers on push of tags matching 'v*'. 7-job DAG:
#   verify -> npm -> (brew, scoop, winget, apt) -> smoke
#
# Secrets required (Plan 204-12 locked_assumption):
#   - NPM_TOKEN             (npm publish; automation token, scoped to markos)
#   - HOMEBREW_TAP_TOKEN    (PAT with repo scope on markos/homebrew-tap)
#   - SCOOP_BUCKET_TOKEN    (PAT with repo scope on markos/scoop-bucket)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # verify: gate all subsequent publish steps on tests + pack smoke
  # --------------------------------------------------------------------------
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run release:smoke

  # --------------------------------------------------------------------------
  # npm: publish the tarball to the npm registry
  # --------------------------------------------------------------------------
  npm:
    name: Publish to npm
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --------------------------------------------------------------------------
  # brew: bump Formula/markos.rb in markos/homebrew-tap
  # --------------------------------------------------------------------------
  brew:
    name: Bump Homebrew formula
    needs: [npm]
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: markos
          formula-path: Formula/markos.rb
          homebrew-tap: markos/homebrew-tap
          download-url: 'https://registry.npmjs.org/markos/-/markos-${{ github.ref_name }}.tgz'
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # --------------------------------------------------------------------------
  # scoop: bump bucket/markos.json in markos/scoop-bucket
  # --------------------------------------------------------------------------
  scoop:
    name: Bump Scoop manifest
    needs: [npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: markos/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Bump manifest
        run: node scripts/distribution/bump-scoop-manifest.cjs '${{ github.ref_name }}'
      - name: Push
        run: |
          git config user.email "bot@markos.com"
          git config user.name  "markos-bot"
          git add bucket/markos.json
          git commit -m "markos: bump to ${{ github.ref_name }}"
          git push

  # --------------------------------------------------------------------------
  # winget: render + validate manifests; operator submits/automates upstream PR
  # --------------------------------------------------------------------------
  winget-publish:
    name: Validate winget manifest
    needs: [npm]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Bump winget manifest
        run: node scripts/distribution/bump-winget-manifest.cjs --version "${{ github.ref_name }}"
      - name: Validate winget manifests
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          winget validate --manifest "winget-pkgs/manifests/m/markos/markos/$version/"
      - name: Require winget-pkgs PR token
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.WINGET_PKGS_PAT }}
        run: |
          if (-not $env:GH_TOKEN) {
            Write-Error "WINGET_PKGS_PAT is required before release CI can automate the microsoft/winget-pkgs PR."
            exit 1
          }
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "::notice::winget manifest ready at winget-pkgs/manifests/m/markos/markos/$version/. Submit this directory to https://github.com/microsoft/winget-pkgs for maintainer review."

  # --------------------------------------------------------------------------
  # apt: build .deb, regenerate repo metadata, sign Release, upload via scp
  # --------------------------------------------------------------------------
  apt-publish:
    name: Publish apt package
    needs: [npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install apt tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gnupg gzip tar openssh-client
      - name: Check apt secrets
        env:
          MARKOS_APT_GPG_KEY: ${{ secrets.MARKOS_APT_GPG_KEY }}
          MARKOS_APT_REPO_HOST: ${{ secrets.MARKOS_APT_REPO_HOST }}
          MARKOS_APT_REPO_KEY: ${{ secrets.MARKOS_APT_REPO_KEY }}
        run: |
          for name in MARKOS_APT_GPG_KEY MARKOS_APT_REPO_HOST MARKOS_APT_REPO_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name secret is required before apt publishing can run"
              exit 1
            fi
          done
      - name: Import GPG key
        env:
          MARKOS_APT_GPG_KEY: ${{ secrets.MARKOS_APT_GPG_KEY }}
          MARKOS_APT_GPG_PASSPHRASE: ${{ secrets.MARKOS_APT_GPG_PASSPHRASE }}
        run: |
          echo "$MARKOS_APT_GPG_KEY" | base64 -d | gpg --batch --yes --pinentry-mode loopback --passphrase "$MARKOS_APT_GPG_PASSPHRASE" --import
      - name: Build .deb, sign repo, and upload
        env:
          MARKOS_APT_GPG_PASSPHRASE: ${{ secrets.MARKOS_APT_GPG_PASSPHRASE }}
          MARKOS_APT_REPO_HOST: ${{ secrets.MARKOS_APT_REPO_HOST }}
          MARKOS_APT_REPO_KEY: ${{ secrets.MARKOS_APT_REPO_KEY }}
        run: node scripts/distribution/bump-apt-package.cjs --version "${{ github.ref_name }}"

  # --------------------------------------------------------------------------
  # smoke: cross-platform install smoke test of the published version
  # --------------------------------------------------------------------------
  smoke:
    name: Smoke install (${{ matrix.os }})
    needs: [npm, brew, scoop, winget-publish, apt-publish]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install markos globally
        run: npm install -g markos@${{ github.ref_name }}
      - name: Run markos --version
        run: markos --version
