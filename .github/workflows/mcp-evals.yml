name: MCP evals

on:
  pull_request:
    paths:
      - 'lib/markos/mcp/tools/**'
      - 'lib/markos/evals/mcp/**'
      - 'test/fixtures/evals/mcp/**'
      - '.github/workflows/mcp-evals.yml'
  push:
    branches:
      - main
    paths:
      - 'lib/markos/mcp/tools/**'
      - 'lib/markos/evals/mcp/**'
      - 'test/fixtures/evals/mcp/**'

jobs:
  evals:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --test-isolation=none
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run deterministic MCP evals
        run: node --test lib/markos/evals/mcp/all.test.js
