[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "markos"
version = "1.0.0"
description = "Python SDK for the MarkOS marketing operating system — generated from contracts/openapi.json."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
  "openapi-python-client>=0.21",
  "pytest>=8",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["markos*"]
